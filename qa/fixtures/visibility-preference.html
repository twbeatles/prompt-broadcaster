<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visibility Preference Fixture</title>
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      margin: 24px;
    }

    main {
      display: grid;
      gap: 12px;
      max-width: 720px;
    }

    .hidden-input,
    .hidden-submit {
      display: none;
    }

    [contenteditable="true"] {
      min-height: 140px;
      border: 1px solid #c9d4de;
      border-radius: 12px;
      padding: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Visibility Preference Fixture</h1>
    <textarea class="hidden-input" aria-label="Prompt composer"></textarea>
    <div id="visible-editor" contenteditable="true" role="textbox" aria-label="Prompt composer"></div>
    <button class="hidden-submit" aria-label="Submit" disabled type="button">Hidden Submit</button>
    <button id="visible-submit" aria-label="Submit" type="button">Visible Submit</button>
  </main>

  <script>
    window.fixtureState = {
      submittedBy: "",
      promptValue: "",
      submitCount: 0,
    };

    const editor = document.getElementById("visible-editor");
    const visibleSubmit = document.getElementById("visible-submit");

    visibleSubmit.addEventListener("click", () => {
      window.fixtureState.submittedBy = "click";
      window.fixtureState.promptValue = editor.textContent;
      window.fixtureState.submitCount += 1;
    });
  </script>
</body>
</html>
