<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background Drop -->
  <rect width="128" height="128" rx="28" fill="url(#bg-grad)"/>
  
  <!-- AI Broadcast / Lightning Symbol Container -->
  <g transform="translate(32, 28)" filter="url(#glow)">
    <!-- Broadcast Waves -->
    <path d="M10 36 A28 28 0 0 1 10 -4" fill="none" stroke="#A78BFA" stroke-width="6" stroke-linecap="round"/>
    <path d="M54 36 A28 28 0 0 0 54 -4" fill="none" stroke="#A78BFA" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Central Lightning -->
    <path d="M38 4 L22 34 L32 34 L26 68 L48 26 L36 26 Z" fill="#FFFFFF"/>
  </g>
</svg>
