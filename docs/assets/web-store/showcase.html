<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Prompt Broadcaster Web Store Showcase</title>
  <link rel="stylesheet" href="./showcase.css" />
</head>
<body>
  <div class="scene-shell">
    <div class="scene-noise"></div>
    <header class="hero-bar">
      <div class="brand-lockup">
        <div class="brand-mark">APB</div>
        <div class="brand-copy">
          <div class="eyebrow">Chrome Extension</div>
          <h1 id="scene-title">AI Prompt Broadcaster</h1>
          <p id="scene-subtitle"></p>
        </div>
      </div>
      <div id="scene-chips" class="chip-row"></div>
    </header>

    <main class="stage-grid">
      <section id="primary-stage" class="stage-panel primary-stage"></section>
      <aside id="secondary-stage" class="stage-panel secondary-stage"></aside>
    </main>

    <footer class="scene-footer">
      <div id="scene-caption" class="scene-caption"></div>
      <div class="scene-meta">1280 x 800 store screenshot source</div>
    </footer>
  </div>

  <script src="./showcase.js"></script>
</body>
</html>
